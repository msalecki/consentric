name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Minimal token permissions — this workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
